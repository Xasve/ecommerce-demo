<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEthan — E-Commerce Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #22222c;
      --border: #2a2a38;
      --text: #e8e8f0;
      --muted: #7878a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,19,.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; color: var(--text); display: flex; align-items: center; gap: .5rem; }
    .nav-brand span { color: var(--accent); }
    .nav-center { display: flex; gap: .25rem; }
    .nav-tab { background: none; border: none; color: var(--muted); font-size: .85rem; font-family: inherit; padding: .4rem .9rem; border-radius: 6px; cursor: pointer; transition: all .2s; }
    .nav-tab:hover, .nav-tab.active { background: var(--surface2); color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: .4rem .8rem; color: var(--text); font-family: inherit; font-size: .85rem; width: 200px; outline: none; transition: border-color .2s; }
    .search-box:focus { border-color: var(--accent); }
    .cart-btn { position: relative; background: var(--accent); border: none; border-radius: 8px; padding: .45rem .9rem; color: white; font-family: inherit; font-size: .85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: .4rem; transition: background .2s; }
    .cart-btn:hover { background: var(--accent-hover); }
    .cart-badge { position: absolute; top: -6px; right: -6px; background: var(--red); color: white; font-size: .65rem; font-weight: 700; border-radius: 999px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .hero { background: linear-gradient(135deg, #13131a 0%, #1a1a2e 100%); padding: 3rem 2rem; text-align: center; border-bottom: 1px solid var(--border); }
    .hero h1 { font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 700; margin-bottom: .75rem; }
    .hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { color: var(--muted); font-size: .95rem; max-width: 480px; margin: 0 auto; }
    .filters-bar { display: flex; align-items: center; gap: .75rem; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); overflow-x: auto; flex-wrap: wrap; }
    .filter-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: .35rem .9rem; font-size: .82rem; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .2s; }
    .filter-chip:hover, .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
    .sort-select { margin-left: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: .35rem .7rem; color: var(--text); font-family: inherit; font-size: .82rem; cursor: pointer; outline: none; }
    .main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform .2s, border-color .2s; cursor: pointer; }
    .product-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .product-img { width: 100%; height: 180px; object-fit: cover; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .product-body { padding: 1rem; }
    .product-badge { display: inline-block; background: rgba(99,102,241,.15); color: var(--accent); font-size: .72rem; font-weight: 600; padding: .2rem .6rem; border-radius: 4px; margin-bottom: .5rem; }
    .product-badge.sale { background: rgba(34,197,94,.15); color: var(--green); }
    .product-name { font-weight: 600; font-size: .95rem; margin-bottom: .35rem; }
    .product-desc { color: var(--muted); font-size: .8rem; line-height: 1.5; margin-bottom: .75rem; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .product-price .old { font-size: .8rem; color: var(--muted); text-decoration: line-through; margin-left: .35rem; }
    .add-btn { background: var(--accent); border: none; border-radius: 7px; padding: .4rem .85rem; color: white; font-family: inherit; font-size: .8rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    .add-btn:hover { background: var(--accent-hover); }
    .add-btn.added { background: var(--green); }
    .rating { display: flex; align-items: center; gap: .2rem; margin-bottom: .5rem; }
    .stars { color: #f59e0b; font-size: .8rem; }
    .rating-num { color: var(--muted); font-size: .75rem; }
    .stock-low { color: var(--red); font-size: .75rem; margin-top: .3rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--muted); margin-bottom: 1.25rem; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; }
    .overlay.open { display: flex; align-items: flex-start; justify-content: flex-end; }
    .cart-panel { background: var(--surface); width: 380px; height: 100vh; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; animation: slideIn .25s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .cart-header { display: flex; align-items: center; justify-content: space-between; }
    .cart-header h2 { font-size: 1.1rem; font-weight: 700; }
    .close-btn { background: var(--surface2); border: none; border-radius: 7px; width: 32px; height: 32px; color: var(--text); font-size: 1.1rem; cursor: pointer; }
    .cart-item { display: flex; gap: .75rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
    .cart-item-img { width: 56px; height: 56px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: .88rem; font-weight: 600; margin-bottom: .2rem; }
    .cart-item-price { font-size: .85rem; color: var(--accent); font-weight: 700; }
    .qty-controls { display: flex; align-items: center; gap: .5rem; margin-top: .4rem; }
    .qty-btn { background: var(--surface2); border: none; border-radius: 5px; width: 24px; height: 24px; color: var(--text); font-size: .9rem; cursor: pointer; }
    .qty-num { font-size: .85rem; font-weight: 600; min-width: 16px; text-align: center; }
    .remove-btn { background: none; border: none; color: var(--red); font-size: .75rem; cursor: pointer; margin-left: auto; align-self: flex-start; padding-top: .2rem; }
    .cart-empty { text-align: center; color: var(--muted); padding: 3rem 0; font-size: .9rem; }
    .cart-total { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .cart-total-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: .5rem; color: var(--muted); }
    .cart-total-row.total { color: var(--text); font-weight: 700; font-size: 1rem; margin-top: .5rem; padding-top: .5rem; border-top: 1px solid var(--border); }
    .checkout-btn { width: 100%; background: var(--accent); border: none; border-radius: 9px; padding: .85rem; color: white; font-family: inherit; font-size: .95rem; font-weight: 700; cursor: pointer; margin-top: .75rem; transition: background .2s; }
    .checkout-btn:hover { background: var(--accent-hover); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: .65rem 1.25rem; font-size: .85rem; font-weight: 500; z-index: 999; transition: transform .3s; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
    .form-group { display: flex; flex-direction: column; gap: .35rem; margin-bottom: .75rem; }
    .form-label { font-size: .8rem; color: var(--muted); font-weight: 500; }
    .form-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .55rem .8rem; color: var(--text); font-family: inherit; font-size: .88rem; outline: none; transition: border-color .2s; }
    .form-input:focus { border-color: var(--accent); }
    .section-divider { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin: 1.25rem 0 .75rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
    .order-summary { background: var(--surface2); border-radius: 9px; padding: 1rem; margin-bottom: 1rem; }
    .order-summary-title { font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: .75rem; }
    .order-line { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: .35rem; }
    .pay-btn { width: 100%; background: var(--green); border: none; border-radius: 9px; padding: .85rem; color: white; font-family: inherit; font-size: .95rem; font-weight: 700; cursor: pointer; margin-top: .5rem; transition: opacity .2s; }
    .pay-btn:hover { opacity: .9; }
    .success-screen { text-align: center; padding: 2rem 0; }
    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .success-screen h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: .5rem; }
    .success-screen p { color: var(--muted); font-size: .9rem; }
    @media (max-width: 600px) {
      .cart-panel { width: 100vw; }
      nav { padding: 0 1rem; }
      .nav-center { display: none; }
      .search-box { width: 140px; }
      .main { padding: 1rem; }
      .filters-bar { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>●</span> ShopEthan</div>
  <div class="nav-center">
    <button class="nav-tab active" onclick="setCategory('all',this)">All</button>
    <button class="nav-tab" onclick="setCategory('tech',this)">Tech</button>
    <button class="nav-tab" onclick="setCategory('clothing',this)">Clothing</button>
    <button class="nav-tab" onclick="setCategory('home',this)">Home</button>
  </div>
  <div class="nav-right">
    <input class="search-box" type="text" placeholder="Search products..." oninput="filterSearch(this.value)">
    <button class="cart-btn" onclick="toggleCart()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Cart
      <span class="cart-badge" id="cart-badge" style="display:none">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <h1>Find what you <em>need</em></h1>
  <p>Full e-commerce platform demo with cart, filters, and checkout. Stack: React · Node.js · MongoDB · JWT</p>
</div>

<div class="filters-bar">
  <span style="font-size:.82rem;color:var(--muted);font-weight:500">Filter:</span>
  <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
  <button class="filter-chip" onclick="setFilter('new',this)">New</button>
  <button class="filter-chip" onclick="setFilter('sale',this)">On Sale</button>
  <button class="filter-chip" onclick="setFilter('top',this)">Best Sellers</button>
  <select class="sort-select" onchange="sortProducts(this.value)">
    <option value="default">Sort: Relevance</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="rating">Top Rated</option>
  </select>
</div>

<div class="main">
  <p class="section-title" id="result-count"></p>
  <div class="products-grid" id="products-grid"></div>
</div>

<div class="overlay" id="cart-overlay" onclick="closeCartOutside(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-total" id="cart-total" style="display:none">
      <div class="cart-total-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
      <div class="cart-total-row"><span>Shipping</span><span>Free</span></div>
      <div class="cart-total-row total"><span>Total</span><span id="total">$0</span></div>
      <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout →</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="checkout-modal">
  <div class="modal" id="checkout-content">
    <h2>Complete Order</h2>
    <div class="order-summary">
      <div class="order-summary-title">ORDER SUMMARY</div>
      <div id="checkout-items"></div>
      <div class="order-line" style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);font-weight:700">
        <span>Total</span><span id="checkout-total">$0</span>
      </div>
    </div>
    <div class="section-divider">Contact Information</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">First Name</label><input class="form-input" placeholder="John"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" placeholder="Smith"></div>
    </div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" placeholder="john@email.com" type="email"></div>
    <div class="section-divider">Shipping Address</div>
    <div class="form-group"><label class="form-label">Address</label><input class="form-input" placeholder="123 Main Street"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">City</label><input class="form-input" placeholder="New York"></div>
      <div class="form-group"><label class="form-label">ZIP Code</label><input class="form-input" placeholder="10001"></div>
    </div>
    <div class="section-divider">Payment Details</div>
    <div class="form-group"><label class="form-label">Card Number</label><input class="form-input" placeholder="4242 4242 4242 4242" maxlength="19" oninput="formatCard(this)"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Expiry</label><input class="form-input" placeholder="MM/YY" maxlength="5" oninput="formatExp(this)"></div>
      <div class="form-group"><label class="form-label">CVV</label><input class="form-input" placeholder="123" maxlength="3" type="password"></div>
    </div>
    <button class="pay-btn" onclick="processPayment()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:.4rem;vertical-align:middle"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Pay Now — Demo
    </button>
    <button onclick="closeCheckout()" style="width:100%;background:none;border:none;color:var(--muted);font-family:inherit;font-size:.85rem;cursor:pointer;margin-top:.75rem;">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const PRODUCTS = [
    { id:1, name:'Mechanical Keyboard Pro', category:'tech', desc:'Cherry MX Red switches, per-key RGB, anodized aluminum. Ultra-low latency.', price:89, old:120, emoji:'⌨️', rating:4.8, reviews:234, badge:'sale', stock:15 },
    { id:2, name:'4K UltraWide Monitor', category:'tech', desc:'34" IPS, 144Hz, 1ms, HDR400. Perfect for professional work and gaming.', price:399, old:null, emoji:'🖥️', rating:4.9, reviews:89, badge:'top', stock:8 },
    { id:3, name:'ANC Pro Headphones', category:'tech', desc:'Active noise cancellation, 30h battery, Hi-Fi audio with 40mm drivers.', price:159, old:220, emoji:'🎧', rating:4.7, reviews:412, badge:'sale', stock:22 },
    { id:4, name:'Ergonomic Mouse', category:'tech', desc:'Vertical design, 6 programmable buttons, 3200 DPI optical sensor.', price:45, old:null, emoji:'🖱️', rating:4.5, reviews:178, badge:'new', stock:40 },
    { id:5, name:'4K AutoFocus Webcam', category:'tech', desc:'4K at 30fps, smart autofocus, integrated stereo microphone.', price:129, old:160, emoji:'📷', rating:4.6, reviews:95, badge:'sale', stock:12 },
    { id:6, name:'1TB NVMe SSD', category:'tech', desc:'7000MB/s read speed, PCIe 4.0, PS5 compatible.', price:99, old:null, emoji:'💾', rating:4.9, reviews:567, badge:'top', stock:60 },
    { id:7, name:'Premium Black Hoodie', category:'clothing', desc:'100% organic cotton, modern cut, kangaroo pocket with inner zipper.', price:55, old:75, emoji:'🧥', rating:4.7, reviews:203, badge:'sale', stock:35 },
    { id:8, name:'Runner X Sneakers', category:'clothing', desc:'Reactive cushioning sole, breathable mesh upper, ultra-lightweight.', price:120, old:null, emoji:'👟', rating:4.8, reviews:342, badge:'top', stock:20 },
    { id:9, name:'Snapback Cap', category:'clothing', desc:'6 structured panels, stain-resistant technical fabric, precise back adjustment.', price:32, old:null, emoji:'🧢', rating:4.4, reviews:88, badge:'new', stock:50 },
    { id:10, name:'LED Desk Lamp', category:'home', desc:'3 color modes, 10 brightness levels, built-in wireless phone charging.', price:68, old:90, emoji:'💡', rating:4.6, reviews:156, badge:'sale', stock:18 },
    { id:11, name:'WiFi Smart Plug', category:'home', desc:'App control, Alexa & Google Home compatible, real-time power monitoring.', price:24, old:null, emoji:'🔌', rating:4.5, reviews:290, badge:'new', stock:80 },
    { id:12, name:'Automatic Coffee Maker', category:'home', desc:'15-bar pressure, milk frother, 12 programmable recipes, 1.8L tank.', price:189, old:250, emoji:'☕', rating:4.9, reviews:721, badge:'top', stock:5 },
  ];

  let cart = [];
  let currentCategory = 'all';
  let currentFilter = 'all';
  let currentSearch = '';
  let currentSort = 'default';

  function getFiltered() {
    let p = [...PRODUCTS];
    if (currentCategory !== 'all') p = p.filter(x => x.category === currentCategory);
    if (currentFilter === 'new') p = p.filter(x => x.badge === 'new');
    else if (currentFilter === 'sale') p = p.filter(x => x.badge === 'sale');
    else if (currentFilter === 'top') p = p.filter(x => x.badge === 'top');
    if (currentSearch) p = p.filter(x => x.name.toLowerCase().includes(currentSearch.toLowerCase()) || x.desc.toLowerCase().includes(currentSearch.toLowerCase()));
    if (currentSort === 'price-asc') p.sort((a,b) => a.price - b.price);
    else if (currentSort === 'price-desc') p.sort((a,b) => b.price - a.price);
    else if (currentSort === 'rating') p.sort((a,b) => b.rating - a.rating);
    return p;
  }

  function renderProducts() {
    const p = getFiltered();
    const grid = document.getElementById('products-grid');
    document.getElementById('result-count').textContent = `${p.length} product${p.length !== 1 ? 's' : ''} found`;
    grid.innerHTML = p.map(prod => {
      const inCart = cart.find(c => c.id === prod.id);
      return `<div class="product-card">
        <div class="product-img">${prod.emoji}</div>
        <div class="product-body">
          <span class="product-badge ${prod.badge === 'sale' ? 'sale' : ''}">${prod.badge === 'new' ? 'New' : prod.badge === 'sale' ? 'Sale' : 'Top'}</span>
          <div class="product-name">${prod.name}</div>
          <div class="rating">
            <span class="stars">${'★'.repeat(Math.floor(prod.rating))}${'☆'.repeat(5-Math.floor(prod.rating))}</span>
            <span class="rating-num">${prod.rating} (${prod.reviews})</span>
          </div>
          <div class="product-desc">${prod.desc}</div>
          <div class="product-footer">
            <div class="product-price">$${prod.price}${prod.old ? `<span class="old">$${prod.old}</span>` : ''}</div>
            <button class="add-btn ${inCart ? 'added' : ''}" onclick="addToCart(${prod.id},event)">${inCart ? '✓ Added' : '+ Add'}</button>
          </div>
          ${prod.stock < 10 ? `<div class="stock-low">⚠ Only ${prod.stock} left in stock</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function addToCart(id, e) {
    e.stopPropagation();
    const prod = PRODUCTS.find(p => p.id === id);
    const existing = cart.find(c => c.id === id);
    if (existing) existing.qty++;
    else cart.push({ ...prod, qty: 1 });
    updateCartBadge(); renderProducts(); renderCart();
    showToast(`${prod.emoji} ${prod.name} added to cart`);
  }

  function updateCartBadge() {
    const badge = document.getElementById('cart-badge');
    const total = cart.reduce((s,c) => s + c.qty, 0);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
  }

  function renderCart() {
    const container = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');
    if (cart.length === 0) {
      container.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
      totalEl.style.display = 'none';
      return;
    }
    totalEl.style.display = 'block';
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-img">${item.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>
        <button class="remove-btn" onclick="removeItem(${item.id})">✕ Remove</button>
      </div>
    `).join('');
    const subtotal = cart.reduce((s,c) => s + c.price * c.qty, 0);
    document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('total').textContent = '$' + subtotal.toFixed(2);
  }

  function changeQty(id, delta) {
    const item = cart.find(c => c.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
    updateCartBadge(); renderCart(); renderProducts();
  }

  function removeItem(id) {
    cart = cart.filter(c => c.id !== id);
    updateCartBadge(); renderCart(); renderProducts();
  }

  function toggleCart() {
    document.getElementById('cart-overlay').classList.toggle('open');
    renderCart();
  }

  function closeCartOutside(e) {
    if (e.target === document.getElementById('cart-overlay')) toggleCart();
  }

  function openCheckout() {
    document.getElementById('cart-overlay').classList.remove('open');
    const items = cart.map(i => `<div class="order-line"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('');
    document.getElementById('checkout-items').innerHTML = items;
    document.getElementById('checkout-total').textContent = '$' + cart.reduce((s,c) => s + c.price*c.qty, 0).toFixed(2);
    document.getElementById('checkout-modal').classList.add('open');
  }

  function closeCheckout() { document.getElementById('checkout-modal').classList.remove('open'); }

  function processPayment() {
    document.getElementById('checkout-content').innerHTML = `
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h3>Order Confirmed!</h3>
        <p style="margin-bottom:.75rem">Your order has been successfully processed.</p>
        <p style="color:var(--accent);font-size:.9rem;font-weight:600">Order #${Math.floor(Math.random()*90000)+10000}</p>
        <p style="color:var(--muted);font-size:.8rem;margin-top:.5rem">A confirmation email will be sent shortly.</p>
        <button onclick="location.reload()" style="margin-top:1.5rem;background:var(--accent);border:none;border-radius:9px;padding:.7rem 1.5rem;color:white;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;">Keep Shopping</button>
      </div>`;
  }

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts();
  }

  function filterSearch(val) { currentSearch = val; renderProducts(); }
  function sortProducts(val) { currentSort = val; renderProducts(); }

  function formatCard(input) {
    let v = input.value.replace(/\D/g,'').slice(0,16);
    input.value = v.replace(/(\d{4})(?=\d)/g,'$1 ');
  }

  function formatExp(input) {
    let v = input.value.replace(/\D/g,'').slice(0,4);
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    input.value = v;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  renderProducts();
</script>
</body>
</html>
